key: aws.cloudwatch
provider: aws
name: Amazon CloudWatch
description: Metrics, logs, dashboards, and alarms for AWS resources and applications.
status: ga
icon: aws/observability/cloudwatch.svg
docs: https://docs.aws.amazon.com/cloudwatch/
abstractTypes: [observability.metrics, observability.logs, observability.alerting]
capabilities:
  dashboards: { supported: true }
  alarms: { supported: true }
  logInsights: { supported: true }
properties:
  logRetentionDays: { type: integer, enum: [1, 7, 14, 30, 90, 365, 0], default: 30 }
  detailedMonitoring: { type: boolean, default: false }
connectionRules:
  inbound:
    - { kinds: [dependency], from: [compute.vm, compute.container.orchestrator.service, compute.serverless.function, database.relational, network.loadbalancer.l7] }
  outbound:
    - { kinds: [async], to: [messaging.topic] }
  # Architecture-intelligence metadata (Phase 3B / docs/architecture-intelligence.md §1).
  knowledge:
    recommendedTargets: [messaging.topic]
    requiresIntermediary:
      storage.object: [compute.serverless.function]
    antiPatterns:
      - { to: storage.object, reason: "CloudWatch can't write to S3 directly — use a Logs subscription to a function (or Firehose)." }
    recommendedPatterns: [alarm-fanout]
