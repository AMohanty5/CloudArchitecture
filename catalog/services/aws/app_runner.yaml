key: aws.app_runner
provider: aws
name: AWS App Runner
description: Fully managed service to run containerized web apps and APIs from source or image.
status: ga
icon: aws/compute/app_runner.svg
docs: https://docs.aws.amazon.com/apprunner/
abstractTypes: [compute.serverless.app]
capabilities:
  autoscaling: { supported: true }
  scaleToZero: { supported: false }
properties:
  cpu: { type: string, enum: ["0.25 vCPU", "0.5 vCPU", "1 vCPU", "2 vCPU", "4 vCPU"], default: "1 vCPU" }
  memory: { type: string, enum: ["0.5 GB", "1 GB", "2 GB", "3 GB", "4 GB"], default: "2 GB" }
  port: { type: integer, minimum: 1, maximum: 65535, default: 8080 }
connectionRules:
  inbound:
    - { kinds: [traffic], protocols: [https], from: [network.cdn, external] }
  outbound:
    - { kinds: [data], to: [database.relational, database.keyvalue, storage.object] }
