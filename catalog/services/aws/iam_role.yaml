key: aws.iam_role
provider: aws
name: IAM Role
description: An assumable identity with scoped permissions for workloads or services.
status: ga
icon: aws/security/iam_role.svg
docs: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_roles.html
abstractTypes: [security.identity.principal]
properties:
  trustedPrincipal: { type: string, description: Service or account allowed to assume the role. }
  managedPolicyCount: { type: integer, minimum: 0 }
  permissionsBoundary: { type: string, securityRelevant: true }
connectionRules:
  inbound:
    - { kinds: [identity], from: [security.identity] }
  outbound:
    - { kinds: [identity], to: [compute.serverless.function, compute.container.orchestrator.service, compute.vm, storage.object, database.relational] }
  # Architecture-intelligence metadata (Phase 3B / docs/architecture-intelligence.md §1).
  knowledge:
    recommendedTargets: [compute.serverless.function, compute.vm, compute.container.orchestrator.service]
    antiPatterns:
      - { to: storage.object, reason: "An IAM role grants access — it doesn't move data. Connect the compute that assumes it to the resource." }
      - { to: database.relational, reason: "A role is a permission, not a data path; wire the assuming workload to the database." }
    recommendedPatterns: [assume-role]
