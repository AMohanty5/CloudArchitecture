key: aws.documentdb
provider: aws
name: Amazon DocumentDB
description: MongoDB-compatible managed document database.
status: ga
icon: aws/database/documentdb.svg
docs: https://docs.aws.amazon.com/documentdb/
abstractTypes: [database.document]
capabilities:
  ha: { supported: true, mechanism: multi-az-replicas }
  backup: { supported: true }
properties:
  engineVersion: { type: string, enum: ["4.0", "5.0"], default: "5.0" }
  instanceClass: { type: string, default: db.r6g.large, costDimension: instance_hours }
  instanceCount: { type: integer, minimum: 1, maximum: 16, default: 3 }
  storageEncrypted: { type: boolean, default: true, securityRelevant: true }
connectionRules:
  inbound:
    - { kinds: [data], protocols: [mongodb], from: [compute.vm.autoscaling_group, compute.container.orchestrator.service, compute.serverless.function] }
