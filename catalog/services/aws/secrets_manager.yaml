key: aws.secrets_manager
provider: aws
name: AWS Secrets Manager
description: Managed secret storage with rotation.
status: ga
icon: aws/security/secrets_manager.svg
docs: https://docs.aws.amazon.com/secretsmanager/
abstractTypes: [security.secrets]
properties:
  rotationDays: { type: integer, minimum: 1, maximum: 365 }
  recoveryWindowDays: { type: integer, minimum: 0, maximum: 30, default: 30 }
connectionRules:
  inbound:
    - { kinds: [dependency], from: [compute.serverless.function, compute.vm, database.relational] }
