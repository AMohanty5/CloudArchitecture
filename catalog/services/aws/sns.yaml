key: aws.sns
provider: aws
name: Amazon SNS
description: Pub/sub notification topic.
status: ga
icon: aws/messaging/sns.svg
docs: https://docs.aws.amazon.com/sns/
abstractTypes: [messaging.topic]
capabilities:
  fanout: { supported: true }
properties:
  fifo: { type: boolean, default: false }
  encrypted: { type: boolean, default: true, securityRelevant: true }
connectionRules:
  inbound:
    - { kinds: [async], from: [compute.serverless.function, compute.vm] }
  outbound:
    - { kinds: [async], to: [messaging.queue, compute.serverless.function] }
  # Architecture-intelligence metadata (Phase 3B / docs/architecture-intelligence.md §1).
  knowledge:
    recommendedTargets: [messaging.queue, compute.serverless.function]
    requiresIntermediary:
      storage.object: [compute.serverless.function]
    antiPatterns:
      - { to: storage.object, reason: "A topic fans out notifications — it doesn't persist. Subscribe a function (or queue + consumer) that writes to storage." }
    recommendedPatterns: [event-fanout]
