key: aws.security_group
provider: aws
name: Security Group
description: Stateful virtual firewall attached to ENIs (instances, ENIs, load balancers).
status: ga
icon: aws/networking/security_group.svg
docs: https://docs.aws.amazon.com/vpc/latest/userguide/vpc-security-groups.html
abstractTypes: [network.firewall.network]
capabilities:
  stateful: { supported: true }
properties:
  ingressCount: { type: integer, minimum: 0, description: Number of inbound rules. }
  egressCount: { type: integer, minimum: 0, description: Number of outbound rules. }
connectionRules:
  # A security group attaches to any ENI-bearing resource: instances, container tasks,
  # load balancers, and VPC-resident managed services (RDS, ElastiCache, OpenSearch,
  # in-VPC Lambda). `dependency` is undirected, so the edge may be drawn either way.
  outbound:
    - {
        kinds: [dependency],
        to: [
          compute.vm,
          compute.container.orchestrator.service,
          compute.serverless.function,
          network.loadbalancer.l7,
          network.loadbalancer.l4,
          database.relational,
          database.cache,
          database.search,
          network.endpoint.private,
        ],
      }
