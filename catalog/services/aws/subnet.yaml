key: aws.subnet
provider: aws
name: VPC Subnet
description: A range of IPs within a VPC, in one availability zone. Materializes as a CAML group of kind `subnet`.
status: ga
icon: aws/networking/subnet.svg
docs: https://docs.aws.amazon.com/vpc/latest/userguide/configure-subnets.html
groupKind: subnet
properties:
  cidr:
    type: string
    pattern: "^(\\d{1,3}\\.){3}\\d{1,3}/(1[6-9]|2[0-9]|3[0-2])$"
    description: IPv4 CIDR block within the parent VPC.
  zone:
    type: string
    description: Availability zone, e.g. us-east-1a.
  public:
    type: boolean
    default: false
    description: True if the subnet has a route to an internet gateway.
