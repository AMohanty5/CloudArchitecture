key: aws.aurora_mysql
provider: aws
name: Amazon Aurora (MySQL-compatible)
description: MySQL-compatible managed relational database with distributed storage.
status: ga
icon: aws/database/aurora.svg
docs: https://docs.aws.amazon.com/AmazonRDS/latest/AuroraUserGuide/
abstractTypes: [database.relational]
capabilities:
  ha: { supported: true, mechanism: multi-az-replicas }
  backup: { supported: true }
properties:
  engineVersion: { type: string, enum: ["5.7", "8.0"], default: "8.0" }
  instanceClass:
    type: string
    pattern: "^db\\.(r6g|r7g|x2g|t4g)\\.[a-z0-9]+$"
    description: Aurora instance class, e.g. db.r7g.large.
    costDimension: instance_hours
  replicas: { type: integer, minimum: 0, maximum: 15, default: 1 }
  multiAz: { type: boolean, default: true }
  storageEncrypted: { type: boolean, default: true, securityRelevant: true }
  kmsKeyRef: { type: string }
connectionRules:
  inbound:
    - { kinds: [data], protocols: [mysql], from: [compute.vm, compute.container.orchestrator.service, compute.serverless.function] }
  outbound:
    - { kinds: [replication], to: [database.relational] }
