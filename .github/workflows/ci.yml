name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test (unit)
        run: pnpm test

      # Integration + contract suites spin their own Postgres via Testcontainers
      # (Docker is available on GitHub runners). The contract test boots the built
      # core (apps/core/dist/main.js) and drives it with the generated client.
      - name: Test (integration + contract)
        run: pnpm --filter @cac/core test:int
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'

      # Generate Terraform for the 3-tier fixture and prove it validates against the
      # real AWS provider (doc 03 §3.9). `init -backend=false` installs the provider.
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.8'
      - name: Terraform validate (generated HCL)
        run: |
          pnpm --filter @cac/core exec tsx src/modules/iac/emit.cli.ts \
            "$GITHUB_WORKSPACE/packages/catalog/fixtures/web-3tier.example.json" \
            "$GITHUB_WORKSPACE/tf-out"
          terraform -chdir="$GITHUB_WORKSPACE/tf-out" init -backend=false -input=false
          terraform -chdir="$GITHUB_WORKSPACE/tf-out" validate -no-color
