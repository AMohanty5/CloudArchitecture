name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test (unit)
        run: pnpm test

      # Integration + contract suites spin their own Postgres via Testcontainers
      # (Docker is available on GitHub runners). The contract test boots the built
      # core (apps/core/dist/main.js) and drives it with the generated client.
      - name: Test (integration + contract)
        run: pnpm --filter @cac/core test:int
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
